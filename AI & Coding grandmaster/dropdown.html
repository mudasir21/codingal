<!DOCTYPE html>
<html>
<head>
    <title>Dropdown Example</title>
</head>
<body>

    <h2>Choose Your Country</h2>

    <form>

        <label>Country:</label>
        <select name="country">
            <option>India</option>
            <option>USA</option>
            <option>UK</option>
            <option>Canada</option>
        </select>

        <br><br>

        <input type="submit" value="Submit">

    </form>

</body>
</html>
