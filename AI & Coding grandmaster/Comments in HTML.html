<!DOCTYPE html>
<html>
<head>
    <title>HTML Comments Example</title>
</head>
<body>

    <!-- This is a single-line comment -->
    <h1>Welcome to HTML</h1>

    <!--
        This is a
        multi-line comment.
        It will not be displayed in the browser.
    -->

    <p>This is a paragraph.</p>

</body>
</html>
