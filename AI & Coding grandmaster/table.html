<!DOCTYPE html>
<html>
<head>
    <title>HTML Table</title>
</head>
<body>

    <h2>Student Marks Table</h2>

    <table border="1">
        <tr>
            <th>Name</th>
            <th>Subject</th>
            <th>Marks</th>
        </tr>

        <tr>
            <td>John</td>
            <td>Math</td>
            <td>85</td>
        </tr>

        <tr>
            <td>Emma</td>
            <td>Science</td>
            <td>90</td>
        </tr>

    </table>

</body>
</html>
